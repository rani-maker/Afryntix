name: Docker Build & Push → Render Deploy

on:
  push:
    branches:
      - main

jobs:
  build-push-deploy:
    name: Build, Push Docker Hub & Trigger Render
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/afryntix:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/afryntix:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render Deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          curl -s --fail "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            && echo "✅ Render deploy triggered" \
            || echo "⚠️  RENDER_DEPLOY_HOOK_URL non configuré"
