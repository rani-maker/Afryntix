# ============================================================
# AFRYNTIX — Render deployment config
# Avant de committer : remplace YOUR_DOCKERHUB_USERNAME
# ============================================================

services:
  - type: web
    name: afryntix
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    healthCheckPath: /api/health

    envVars:
      # --- Database Supabase ---
      - key: DATABASE_URL
        sync: false                        # à saisir dans le dashboard Render

      - key: DIRECT_URL
        sync: false

      # --- Auth ---
      - key: AUTH_SECRET
        sync: false                        # openssl rand -base64 32

      - key: AUTH_URL
        value: https://afryntix.onrender.com   # à adapter si domaine custom

      # --- UltraMsg WhatsApp ---
      - key: ULTRAMSG_INSTANCE_ID
        sync: false                        # ex: instance174294

      - key: ULTRAMSG_TOKEN
        sync: false                        # token UltraMsg

      # --- App publique ---
      - key: NEXT_PUBLIC_APP_NAME
        value: AFRYNTIX

      - key: NEXT_PUBLIC_COMPANY_TAGLINE
        value: "Transport & Logistique Chine - Afrique de l'Ouest"

      - key: NEXT_PUBLIC_APP_URL
        value: https://afryntix.onrender.com   # à adapter si domaine custom

      # APP_URL — utilisé côté serveur pour les liens WhatsApp (runtime, non exposé au client)
      - key: APP_URL
        value: https://www.afryntix.com   # à adapter si domaine custom

      # --- Admin seed ---
      - key: DEFAULT_ADMIN_EMAIL
        sync: false

      - key: DEFAULT_ADMIN_PASSWORD
        sync: false

      - key: DEFAULT_ADMIN_NAME
        sync: false

      - key: DEFAULT_ADMIN_PHONE
        sync: false

      # --- Runtime ---
      - key: NODE_ENV
        value: production
